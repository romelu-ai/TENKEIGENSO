<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学フラッシュカード I — 金属元素（典型）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3350;--accent-alkali:#3ecf8e;--accent-alkaline:#a78bfa;--accent-aluminum:#fb923c;--accent:#3ecf8e;--text:#e8eaf0;--text-sub:#8b90a8;--shadow:0 8px 32px rgba(0,0,0,.5)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:20px}
  header{text-align:center;padding:40px 20px 20px}
  header h1{font-family:'Space Mono',monospace;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.1em;color:var(--accent);text-shadow:0 0 20px rgba(62,207,142,.3)}
  header p{color:var(--text-sub);font-size:.9rem;margin-top:6px}
  .filter-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:24px auto;max-width:760px}
  .filter-btn{padding:8px 20px;border-radius:20px;border:2px solid var(--border);background:var(--surface);color:var(--text-sub);font-family:'Noto Sans JP',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s}
  .filter-btn:hover{border-color:var(--accent);color:var(--text)}
  .filter-btn.active{color:#0f1117;font-weight:700}
  .filter-btn[data-cat=alkali].active{background:var(--accent-alkali);border-color:var(--accent-alkali)}
  .filter-btn[data-cat=alkaline].active{background:var(--accent-alkaline);border-color:var(--accent-alkaline)}
  .filter-btn[data-cat=aluminum].active{background:var(--accent-aluminum);border-color:var(--accent-aluminum)}
  .filter-btn[data-cat=all].active{background:var(--accent);border-color:var(--accent)}
  .filter-btn[data-cat=wrong].active{background:#ef4444;border-color:#ef4444;color:#fff}
  .stats-bar{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:0 auto 28px;max-width:700px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 20px;text-align:center;min-width:90px}
  .stat-num{font-family:'Space Mono',monospace;font-size:1.4rem;color:var(--accent)}
  .stat-label{font-size:.75rem;color:var(--text-sub);margin-top:2px}
  .progress-wrap{max-width:700px;margin:0 auto 20px}
  .progress-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-alkali),var(--accent-alkaline));border-radius:2px;transition:width .4s ease}
  .progress-text{text-align:right;font-size:.75rem;color:var(--text-sub);margin-top:6px;font-family:'Space Mono',monospace}
  .card-area{max-width:700px;margin:0 auto;perspective:1200px}
  .flashcard{width:100%;min-height:320px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1)}
  .flashcard.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);min-height:320px}
  .card-face.back{transform:rotateY(180deg)}
  .card-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-family:'Space Mono',monospace;padding:4px 12px;border-radius:20px;margin-bottom:20px;width:fit-content}
  .badge-alkali{background:rgba(62,207,142,.15);color:var(--accent-alkali);border:1px solid rgba(62,207,142,.3)}
  .badge-alkaline{background:rgba(167,139,250,.15);color:var(--accent-alkaline);border:1px solid rgba(167,139,250,.3)}
  .badge-aluminum{background:rgba(251,146,60,.15);color:var(--accent-aluminum);border:1px solid rgba(251,146,60,.3)}
  .card-num{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--text-sub);margin-bottom:16px}
  .card-question{font-size:clamp(1rem,2.5vw,1.2rem);font-weight:700;line-height:1.7;color:var(--text)}
  .card-hint{margin-top:24px;font-size:.8rem;color:var(--text-sub);display:flex;align-items:center;gap:6px}
  .card-hint::before{content:"▶";font-size:.7rem}
  .card-answer{font-size:clamp(1rem,2.5vw,1.15rem);font-weight:700;line-height:1.8;color:var(--accent);white-space:pre-line;margin-bottom:16px}
  .card-explanation{font-size:.85rem;color:var(--text-sub);line-height:1.7;border-top:1px solid var(--border);padding-top:14px;margin-top:8px}
  .result-btns{display:none;gap:12px;justify-content:center;margin:0 auto 12px;max-width:700px}
  .result-btns.visible{display:flex}
  .controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px auto;max-width:700px}
  .btn{padding:12px 28px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
  .btn-primary{background:var(--accent);color:#0f1117}
  .btn-primary:hover{filter:brightness(1.15);transform:translateY(-2px)}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
  .btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
  .btn-danger:hover{background:rgba(239,68,68,.25);transform:translateY(-2px)}
  .btn-correct{background:rgba(62,207,142,.15);color:var(--accent-alkali);border:1px solid rgba(62,207,142,.3)}
  .btn-correct:hover{background:rgba(62,207,142,.3);transform:translateY(-2px)}
  .btn-wrong{background:rgba(251,146,60,.15);color:var(--accent-aluminum);border:1px solid rgba(251,146,60,.3)}
  .btn-wrong:hover{background:rgba(251,146,60,.3);transform:translateY(-2px)}
  .complete-screen{display:none;text-align:center;max-width:500px;margin:40px auto;padding:48px 32px;background:var(--card);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}
  .complete-screen.visible{display:block}
  .complete-emoji{font-size:4rem;margin-bottom:16px}
  .complete-title{font-family:'Space Mono',monospace;font-size:1.5rem;color:var(--accent);margin-bottom:12px}
  .complete-score{font-size:3rem;font-weight:700;color:var(--text);margin:16px 0;font-family:'Space Mono',monospace}
  .complete-sub{color:var(--text-sub);font-size:.9rem}
  .theme-toggle{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);color:var(--text-sub);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
  body.light{--bg:#f4f6fb;--surface:#fff;--card:#fff;--border:#e2e6f0;--text:#1a1d27;--text-sub:#6b7280;--shadow:0 8px 32px rgba(0,0,0,.1)}
  @media(max-width:480px){.card-face{padding:24px 20px}.btn{padding:10px 18px;font-size:.85rem}}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
<header>
  <h1>⚗ CHEMISTRY FLASH I</h1>
  <p>第2編 金属元素（典型元素） — 全100問</p>
</header>
<div class="filter-bar">
  <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" data-cat="alkali" onclick="setFilter('alkali',this)">アルカリ金属</button>
  <button class="filter-btn" data-cat="alkaline" onclick="setFilter('alkaline',this)">アルカリ土類金属</button>
  <button class="filter-btn" data-cat="aluminum" onclick="setFilter('aluminum',this)">Al・Sn・Pb</button>
  <button class="filter-btn" data-cat="wrong" onclick="setFilter('wrong',this)">❌ 間違えた問題 <span id="wrong-count-badge" style="margin-left:4px;background:rgba(239,68,68,.25);color:#f87171;border-radius:10px;padding:1px 7px;font-size:.75rem">0</span></button>
  <button class="filter-btn" id="clear-wrong-btn" onclick="clearWrongList()" style="border-color:rgba(239,68,68,.3);color:#f87171;display:none">🗑 リセット</button>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">合計</div></div>
  <div class="stat"><div class="stat-num" id="stat-correct" style="color:var(--accent-alkali)">0</div><div class="stat-label">正解</div></div>
  <div class="stat"><div class="stat-num" id="stat-wrong" style="color:var(--accent-aluminum)">0</div><div class="stat-label">不正解</div></div>
  <div class="stat"><div class="stat-num" id="stat-remain" style="color:var(--accent-alkaline)">0</div><div class="stat-label">残り</div></div>
</div>
<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-text" id="progress-text">0 / 0</div>
</div>
<div class="card-area" id="card-area">
  <div class="flashcard" id="flashcard" onclick="flipCard()">
    <div class="card-face front">
      <div class="card-num" id="card-num"></div>
      <div class="card-badge" id="card-badge"></div>
      <div class="card-question" id="card-question"></div>
      <div class="card-hint">タップして答えを確認</div>
    </div>
    <div class="card-face back">
      <div class="card-badge" id="card-badge-back"></div>
      <div class="card-answer" id="card-answer"></div>
      <div class="card-explanation" id="card-explanation"></div>
    </div>
  </div>
</div>
<div class="result-btns" id="result-btns">
  <button class="btn btn-wrong" onclick="markResult(false)">✗ もう一度</button>
  <button class="btn btn-correct" onclick="markResult(true)">✓ 正解！</button>
</div>
<div class="controls">
  <button class="btn btn-secondary" onclick="prevCard()">← 前へ</button>
  <button class="btn btn-primary" onclick="nextCard()">次へ →</button>
  <button class="btn btn-danger" onclick="shuffleAndReset()">🔀 シャッフル</button>
</div>
<div class="complete-screen" id="complete-screen">
  <div class="complete-emoji" id="complete-emoji">🎉</div>
  <div class="complete-title">COMPLETE!</div>
  <div class="complete-score" id="complete-score"></div>
  <div class="complete-sub" id="complete-sub"></div>
  <br><br>
  <button class="btn btn-primary" onclick="restartAll()" style="margin:auto">もう一度挑戦</button>
</div>
<script>
const CATEGORIES={
  alkali:{label:'アルカリ金属',cls:'badge-alkali'},
  alkaline:{label:'アルカリ土類金属',cls:'badge-alkaline'},
  aluminum:{label:'Al・Sn・Pb',cls:'badge-aluminum'}
};

const ALL_QUESTIONS=[
// ===== アルカリ金属 =====
{id:1,category:'alkali',question:'アルカリ金属は何族の元素か。',answer:'第1族元素（水素を除く）',explanation:'Li・Na・K・Rb・Cs・Frが含まれる。'},
{id:2,category:'alkali',question:'アルカリ金属に含まれる元素を原子番号順に全て答えよ。',answer:'Li（リチウム）、Na（ナトリウム）、K（カリウム）、Rb（ルビジウム）、Cs（セシウム）、Fr（フランシウム）',explanation:'価電子が1個。全て1族（水素を除く）。'},
{id:3,category:'alkali',question:'アルカリ金属の価電子数を答えよ。',answer:'1個',explanation:'最外殻に電子が1個あるため、1価の陽イオンになりやすい。'},
{id:4,category:'alkali',question:'アルカリ金属を石油中に保存する理由を答えよ。',answer:'空気中の水分・酸素と激しく反応するため、石油中に保存して空気と遮断する。',explanation:'Na、Kなどは空気中に放置すると酸化・発火の危険がある。'},
{id:5,category:'alkali',question:'アルカリ金属の物理的性質①：硬さはどうか。',answer:'軟らかい。ナイフで切ることができる。',explanation:'金属の中では非常に柔らかい部類。'},
{id:6,category:'alkali',question:'アルカリ金属の物理的性質②：融点と密度は他の金属と比べてどうか。',answer:'融点が低く、密度が小さい（軽い）。\nLi・Na・Kは水より密度が小さく、水に浮く。',explanation:'典型的な金属（Fe・Cuなど）に比べ融点・密度ともに低い。'},
{id:7,category:'alkali',question:'アルカリ金属各元素の融点（概算）を答えよ。',answer:'Li：181℃、Na：98℃、K：64℃、Rb：39℃、Cs：29℃',explanation:'原子番号が大きくなるほど融点が低くなる。Csは体温近くで溶ける。'},
{id:8,category:'alkali',question:'アルカリ金属の反応性は原子番号が大きくなるとどう変化するか。',answer:'原子番号が大きいほど反応性が強くなる。\nLi < Na < K < Rb < Cs の順に強い。',explanation:'原子番号が大きいほどイオン化エネルギーが小さく、陽イオンになりやすい。'},
{id:9,category:'alkali',question:'アルカリ金属と水の反応の特徴を答えよ。',answer:'水と反応してH₂を発生し、強塩基性の水酸化物水溶液を生じる。\n2M + 2H₂O → 2MOH + H₂↑',explanation:'K以降は発火しながら激しく反応する。'},
{id:10,category:'alkali',question:'Naと水の反応式を書け。',answer:'2Na + 2H₂O → 2NaOH + H₂↑',explanation:'NaOHは強塩基。H₂が発生し発火することもある。Naは水面を動き回る。'},
{id:11,category:'alkali',question:'Naを空気中で穏やかに加熱したときの反応式と生成物を答えよ。',answer:'4Na + O₂ → 2Na₂O（酸化ナトリウム）',explanation:'穏やかな条件でNa₂Oが生成する。'},
{id:12,category:'alkali',question:'Naを過剰な酸素中で燃焼させたときの反応式と生成物を答えよ。',answer:'2Na + O₂ → Na₂O₂（過酸化ナトリウム）',explanation:'Na₂O₂（過酸化ナトリウム）は強い酸化剤・漂白剤。水と反応してH₂O₂を生じる。'},
{id:13,category:'alkali',question:'NaOHの色・状態と特徴を答えよ。',answer:'白色固体。水に非常によく溶けて強塩基性を示す。潮解性をもつ。',explanation:'潮解性：空気中の水分を吸収して自ら溶けていく性質。密封保存が必要。'},
{id:14,category:'alkali',question:'NaOHが空気中のCO₂（少量）を吸収する反応式を書け。',answer:'2NaOH + CO₂ → Na₂CO₃ + H₂O',explanation:'CO₂が少量の場合はNa₂CO₃（炭酸ナトリウム）が生成する。'},
{id:15,category:'alkali',question:'NaOHが空気中のCO₂（過剰）を吸収する反応式を書け。',answer:'NaOH + CO₂ → NaHCO₃',explanation:'CO₂が過剰の場合はNaHCO₃（炭酸水素ナトリウム）が生成する。'},
{id:16,category:'alkali',question:'Na₂CO₃と希塩酸HClの反応式を書け。',answer:'Na₂CO₃ + 2HCl → 2NaCl + H₂O + CO₂↑',explanation:'弱酸の塩に強酸を加えると弱酸が遊離する反応。CO₂発生。'},
{id:17,category:'alkali',question:'NaHCO₃と希塩酸HClの反応式を書け。',answer:'NaHCO₃ + HCl → NaCl + H₂O + CO₂↑',explanation:'重曹（ベーキングパウダー）の主成分。胃薬にも利用。'},
{id:18,category:'alkali',question:'NaHCO₃を加熱したときの熱分解反応式を書け。',answer:'2NaHCO₃ → Na₂CO₃ + H₂O + CO₂↑',explanation:'ケーキが膨らむ原理。加熱するとNa₂CO₃が残る。'},
{id:19,category:'alkali',question:'Na₂CO₃·10H₂Oの俗称と「風解」について説明せよ。',answer:'俗称：洗濯ソーダ\n風解：乾燥空気中に放置すると結晶水を失い白色粉末（Na₂CO₃·H₂O）になる現象',explanation:'Na₂CO₃·10H₂O → Na₂CO₃·H₂O + 9H₂O'},
{id:20,category:'alkali',question:'ソルベー法（アンモニアソーダ法）の主反応式を書け。',answer:'NaCl + NH₃ + H₂O + CO₂ → NaHCO₃↓ + NH₄Cl',explanation:'飽和食塩水にNH₃とCO₂を吹き込むとNaHCO₃が先に沈殿する。'},
{id:21,category:'alkali',question:'ソルベー法でNaHCO₃をNa₂CO₃に変える工程の反応式を書け。',answer:'2NaHCO₃ → Na₂CO₃ + H₂O + CO₂↑（加熱）',explanation:'生成したNa₂CO₃はガラス・洗剤・製紙の原料として重要。'},
{id:22,category:'alkali',question:'ソルベー法でNH₃を回収する工程の反応式を書け。',answer:'2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃↑ + 2H₂O',explanation:'副生成物のNH₄Clに消石灰を加えてNH₃を回収・循環する。'},
{id:23,category:'alkali',question:'塩化ナトリウムNaClを電気分解（塩化ナトリウムの電解）したときの陰極・陽極での反応を答えよ。',answer:'陰極：2H₂O + 2e⁻ → H₂↑ + 2OH⁻（水の還元）\n陽極：2Cl⁻ → Cl₂↑ + 2e⁻（塩素発生）',explanation:'イオン交換膜法では陽極側にCl₂、陰極側にH₂とNaOHが得られる。'},
{id:24,category:'alkali',question:'炎色反応でLi・Na・Kはそれぞれ何色か。',answer:'Li：赤色\nNa：黄色（橙黄色）\nK：紫色',explanation:'Naは微量でも鮮明な黄色を示す。花火の色に利用される。'},
{id:25,category:'alkali',question:'炎色反応でNaが黄色を示すのはなぜか。',answer:'Na原子の電子が高いエネルギー状態に励起され、基底状態に戻るときに黄色の光を放出するから。',explanation:'各元素固有のスペクトルを放つため、炎色反応で元素の同定ができる。'},

// ===== アルカリ土類金属 =====
{id:26,category:'alkaline',question:'アルカリ土類金属は何族の元素か。価電子数も答えよ。',answer:'第2族元素。価電子数は2個。',explanation:'Be・Mg・Ca・Sr・Ba・Raが含まれる。2価の陽イオンになりやすい。'},
{id:27,category:'alkaline',question:'アルカリ土類金属に含まれる元素を原子番号順に全て答えよ。',answer:'Be（ベリリウム）・Mg（マグネシウム）・Ca（カルシウム）・Sr（ストロンチウム）・Ba（バリウム）・Ra（ラジウム）',explanation:'価電子2個。Ca以降は冷水と反応する。'},
{id:28,category:'alkaline',question:'アルカリ土類金属各元素の融点（概算）を答えよ。',answer:'Be：1282℃、Mg：649℃、Ca：839℃、Sr：769℃、Ba：725℃',explanation:'アルカリ金属より融点が高い。'},
{id:29,category:'alkaline',question:'アルカリ土類金属のうち冷水と反応しないものはどれか。理由も答えよ。',answer:'BeとMg。\n理由：表面に緻密な酸化被膜が形成されて内部が保護されるから。',explanation:'MgはCaと異なり冷水に反応しない。熱水や酸には溶ける。'},
{id:30,category:'alkaline',question:'Mgと酸素の反応式を書け。',answer:'2Mg + O₂ → 2MgO',explanation:'白色の強い光を放って燃焼する。花火・フラッシュ照明に利用。'},
{id:31,category:'alkaline',question:'Mgと熱水の反応式を書け。',answer:'Mg + 2H₂O → Mg(OH)₂ + H₂↑',explanation:'冷水とはほぼ反応しないが、熱水とは反応する。'},
{id:32,category:'alkaline',question:'Caと冷水の反応式を書け。',answer:'Ca + 2H₂O → Ca(OH)₂ + H₂↑',explanation:'Ca(OH)₂（消石灰）が生成。石灰水の主成分で弱塩基性。'},
{id:33,category:'alkaline',question:'CaO（生石灰）と水の反応式と特徴を答えよ。',answer:'CaO + H₂O → Ca(OH)₂\n特徴：激しく発熱する（発熱反応）',explanation:'乾燥剤・土壌改良材。携帯カイロや加熱パックに利用される原理。'},
{id:34,category:'alkaline',question:'Ca(OH)₂（消石灰）を加熱したときの反応式を書け。',answer:'Ca(OH)₂ → CaO + H₂O',explanation:'加熱による脱水分解。CaO（生石灰）に戻る。約900℃。'},
{id:35,category:'alkaline',question:'CaCO₃（石灰石・大理石）を強熱したときの反応式を書け。',answer:'CaCO₃ → CaO + CO₂↑',explanation:'約900℃以上で熱分解。セメント・石灰製造の基本反応。'},
{id:36,category:'alkaline',question:'CaCO₃に希塩酸を加えたときの反応式を書け。',answer:'CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂↑',explanation:'石灰石・大理石・貝殻に塩酸を加えるとCO₂が発生する。'},
{id:37,category:'alkaline',question:'石灰水（Ca(OH)₂水溶液）にCO₂を少量通じたときの変化と反応式を書け。',answer:'白濁する。\nCa(OH)₂ + CO₂ → CaCO₃↓ + H₂O',explanation:'白色沈殿CaCO₃が生じる。CO₂の検出に使用。'},
{id:38,category:'alkaline',question:'石灰水にCO₂を過剰に通じると白濁が消える。その反応式を書け。',answer:'CaCO₃ + H₂O + CO₂ → Ca(HCO₃)₂',explanation:'可溶性のCa(HCO₃)₂（炭酸水素カルシウム）が生成して沈殿が溶ける。'},
{id:39,category:'alkaline',question:'Ca(HCO₃)₂水溶液を加熱したときの反応式と自然界での例を答えよ。',answer:'Ca(HCO₃)₂ → CaCO₃↓ + H₂O + CO₂↑\n自然界：鍾乳洞・鍾乳石の形成',explanation:'地下水中のCa(HCO₃)₂が洞窟内でCaCO₃として析出する。'},
{id:40,category:'alkaline',question:'CaSO₄に関係する「石膏」と「焼き石膏」の関係と化学式を答えよ。',answer:'石膏：CaSO₄·2H₂O（二水和物）\n焼き石膏：CaSO₄·½H₂O（半水和物）\n石膏を120〜140℃で加熱すると焼き石膏になる',explanation:'CaSO₄·2H₂O → CaSO₄·½H₂O + 3/2 H₂O'},
{id:41,category:'alkaline',question:'焼き石膏（CaSO₄·½H₂O）に水を加えたときの反応式と特徴を答えよ。',answer:'CaSO₄·½H₂O + 3/2 H₂O → CaSO₄·2H₂O\n特徴：発熱しながら固化する',explanation:'医療用ギプス・建築材料・型取りに利用される。'},
{id:42,category:'alkaline',question:'アルカリ土類金属の硫酸塩・炭酸塩の水への溶解性をまとめよ。',answer:'硫酸塩：MgSO₄（溶ける）、CaSO₄（わずかに溶ける）、BaSO₄（溶けない）\n炭酸塩：MgCO₃・CaCO₃・BaCO₃（いずれも難溶）',explanation:'BaSO₄は最も溶けにくく、X線造影剤（バリウム検査）に利用。'},
{id:43,category:'alkaline',question:'Ba²⁺の確認反応を答えよ。',answer:'試薬：希硫酸（SO₄²⁻）\nBa²⁺ + SO₄²⁻ → BaSO₄↓（白色沈殿）\n酸にも水にも溶けない',explanation:'BaSO₄は難溶性で化学的に安定。X線で不透明なためX線造影剤として使われる。'},
{id:44,category:'alkaline',question:'アルカリ土類金属の水酸化物の溶解性の傾向を答えよ。',answer:'Be(OH)₂（難溶）、Mg(OH)₂（難溶）、Ca(OH)₂（わずかに溶ける）、Ba(OH)₂（溶ける）\n→ 原子番号が大きいほど溶けやすくなる',explanation:'Ca(OH)₂の水溶液が石灰水。Ba(OH)₂は強塩基。'},
{id:45,category:'alkaline',question:'炎色反応でCa・Sr・Baはそれぞれ何色か。',answer:'Ca：橙赤色\nSr：赤色（深赤色）\nBa：黄緑色',explanation:'花火の色として利用される。SrはLiと同じく赤色だが深みが異なる。'},
{id:46,category:'alkaline',question:'Mgの工業的製錬方法を答えよ。',answer:'海水中のMg²⁺をCa(OH)₂でMg(OH)₂として沈殿させ、塩酸でMgCl₂にしたのち溶融塩電解する。',explanation:'海水が主な原料。軽量合金として航空機・自動車に利用。'},
{id:47,category:'alkaline',question:'Caの工業的製錬方法を答えよ。',answer:'塩化カルシウムCaCl₂の溶融塩電解（CaCl₂ → Ca + Cl₂）',explanation:'Caは反応性が高いため電気分解で製錬する。'},

// ===== Al・Sn・Pb =====
{id:48,category:'aluminum',question:'Alの原料鉱石の名称と化学式を答えよ。',answer:'ボーキサイト（Al₂O₃·nH₂O）',explanation:'アルミナ（Al₂O₃）を精製したうえで溶融塩電解する。'},
{id:49,category:'aluminum',question:'Alの工業的製錬法の名称と概要を答えよ。',answer:'ホール・エルー法（溶融塩電解）\n概要：アルミナ（Al₂O₃）を氷晶石（Na₃AlF₆）に溶かして電気分解する',explanation:'大量の電力を消費するため「電気の缶詰」と呼ばれる。'},
{id:50,category:'aluminum',question:'Al単体の特徴を3つ答えよ。',answer:'① 軽い（密度 2.7 g/cm³）\n② 電気・熱伝導性が高い\n③ 表面に酸化被膜を形成して耐食性をもつ（不動態）',explanation:'アルマイトは陽極酸化でこの被膜を人工的に厚くしたもの。'},
{id:51,category:'aluminum',question:'Alの不動態とはどういう状態か。反応式も書け。',answer:'表面に緻密なAl₂O₃の酸化被膜が形成され内部を保護する状態。\n4Al + 3O₂ → 2Al₂O₃',explanation:'濃硝酸・濃硫酸でも不動態になり溶けない。'},
{id:52,category:'aluminum',question:'Alと希塩酸HClの反応式を書け。',answer:'2Al + 6HCl → 2AlCl₃ + 3H₂↑',explanation:'AlはH₂よりイオン化傾向が大きいため酸に溶けてH₂を発生する。'},
{id:53,category:'aluminum',question:'Alと希硫酸H₂SO₄の反応式を書け。',answer:'2Al + 3H₂SO₄ → Al₂(SO₄)₃ + 3H₂↑',explanation:'希硫酸には溶けるが、濃硫酸では不動態になり溶けない。'},
{id:54,category:'aluminum',question:'Alと水酸化ナトリウムNaOH水溶液の反応式を書け。',answer:'2Al + 2NaOH + 6H₂O → 2Na[Al(OH)₄] + 3H₂↑',explanation:'Alが両性金属であることを示す反応。Na[Al(OH)₄]はテトラヒドロキシドアルミン酸ナトリウム。'},
{id:55,category:'aluminum',question:'テルミット反応の反応式と特徴を答えよ。',answer:'2Al + Fe₂O₃ → Al₂O₃ + 2Fe\n特徴：約3000℃の高熱を発生する',explanation:'AlはFeよりイオン化傾向が大きいためFe₂O₃を還元する。鉄道レールの現場溶接（テルミット溶接）に利用。'},
{id:56,category:'aluminum',question:'Al(OH)₃の両性を示す反応式を2つ書け。',answer:'酸側：Al(OH)₃ + 3HCl → AlCl₃ + 3H₂O\n塩基側：Al(OH)₃ + NaOH → Na[Al(OH)₄]',explanation:'両性水酸化物のため酸にも塩基にも溶ける。'},
{id:57,category:'aluminum',question:'Al³⁺水溶液にNH₃水（少量・過剰）を加えたときの変化を答えよ。',answer:'少量・過剰いずれも白色沈殿Al(OH)₃が生成して溶けない。\nAl³⁺ + 3OH⁻ → Al(OH)₃↓',explanation:'NH₃水は弱塩基のためAl(OH)₃を溶かすほどの塩基性がない。NaOH過剰なら溶ける。'},
{id:58,category:'aluminum',question:'AlCl₃水溶液にNH₃水を加えたときの反応式を書け。',answer:'AlCl₃ + 3NH₃ + 3H₂O → Al(OH)₃↓ + 3NH₄Cl',explanation:'白色のAl(OH)₃が沈殿する。'},
{id:59,category:'aluminum',question:'Al₂O₃の両性を示す反応式を2つ書け。',answer:'酸側：Al₂O₃ + 6HCl → 2AlCl₃ + 3H₂O\n塩基側：Al₂O₃ + 2NaOH + 3H₂O → 2Na[Al(OH)₄]',explanation:'Al₂O₃は両性酸化物。'},
{id:60,category:'aluminum',question:'ミョウバンの化学式・正式名称・結晶形を答えよ。',answer:'化学式：AlK(SO₄)₂·12H₂O\n正式名称：硫酸アルミニウムカリウム十二水和物\n結晶形：正八面体',explanation:'複塩。Al³⁺ + K⁺ + 2SO₄²⁻ + 12H₂Oの組成。'},
{id:61,category:'aluminum',question:'ミョウバンの主な用途を2つ答えよ。',answer:'① 媒染剤（染色時の色止め）\n② 浄水剤（Al(OH)₃のコロイドが不純物を吸着）',explanation:'水に溶かすとAl³⁺が加水分解してAl(OH)₃のコロイドを形成する。'},
{id:62,category:'aluminum',question:'ミョウバンの電離式を書け。',answer:'AlK(SO₄)₂ → Al³⁺ + K⁺ + 2SO₄²⁻',explanation:'12H₂Oは結晶水。水溶液中ではAl³⁺・K⁺・SO₄²⁻に電離する。'},
{id:63,category:'aluminum',question:'スズSnの代表的な酸化数と代表化合物を答えよ。',answer:'+2（SnCl₂など）と+4（SnCl₄・SnO₂など）',explanation:'Sn²⁺は還元剤として働く。SnO₂は白色の両性酸化物。'},
{id:64,category:'aluminum',question:'スズSnの水への溶解性を答えよ。',answer:'水には溶けない（両性金属だが常温の水とは反応しない）。\n酸・塩基には溶ける。',explanation:'Sn + 2HCl → SnCl₂ + H₂↑（酸）\nSn + 2NaOH + 2H₂O → Na₂[Sn(OH)₄] + H₂↑（塩基）'},
{id:65,category:'aluminum',question:'ブリキとはどういうものか。傷がつくと腐食しやすい理由を答えよ。',answer:'鉄板にスズ（Sn）をめっきしたもの。\n理由：Snのイオン化傾向がFeより小さく、傷がつくとFeが先に酸化されるから（Feが犠牲になる）。',explanation:'イオン化傾向：Sn < Fe。缶詰などに使われるが傷に弱い。'},
{id:66,category:'aluminum',question:'トタンとはどういうものか。傷がついても腐食しにくい理由を答えよ。',answer:'鉄板に亜鉛（Zn）をめっきしたもの。\n理由：Znのイオン化傾向がFeより大きく、傷がつくとZnが先に溶けてFeを保護するから（犠牲防食）。',explanation:'イオン化傾向：Zn > Fe。屋根・外壁材に使われる。'},
{id:67,category:'aluminum',question:'鉛Pbの代表的な酸化数と代表化合物を答えよ。',answer:'+2（PbCl₂・PbSO₄・PbS など）と+4（PbO₂・Pb(CH₃COO)₂など）',explanation:'Pb²⁺が安定。PbO₂（+4）は鉛蓄電池の正極として重要。'},
{id:68,category:'aluminum',question:'Pb²⁺に希硫酸を加えたときの反応式と沈殿の色を答えよ。',answer:'Pb²⁺ + SO₄²⁻ → PbSO₄↓（白色沈殿）',explanation:'PbSO₄は難溶性。Pb²⁺の確認反応。'},
{id:69,category:'aluminum',question:'Pb²⁺に希塩酸を加えたときの反応式と沈殿の特徴を答えよ。',answer:'Pb²⁺ + 2Cl⁻ → PbCl₂↓（白色沈殿）\n冷水に難溶、熱水に溶ける',explanation:'Ag⁺との分離に利用（PbCl₂は熱水に溶けるがAgClは溶けない）。'},
{id:70,category:'aluminum',question:'Pb²⁺にH₂Sを通じたときの反応式と沈殿の色を答えよ。',answer:'Pb²⁺ + S²⁻ → PbS↓（黒色沈殿）',explanation:'PbSは黒色で難溶性。'},
{id:71,category:'aluminum',question:'Pb²⁺にクロム酸カリウムK₂CrO₄を加えたときの反応式と沈殿の色を答えよ。',answer:'Pb²⁺ + CrO₄²⁻ → PbCrO₄↓（黄色沈殿）',explanation:'PbCrO₄は黄色沈殿。Pb²⁺の確認反応に使われる。'},
{id:72,category:'aluminum',question:'鉛蓄電池の正極・負極・電解液を答えよ。',answer:'正極：PbO₂（二酸化鉛）\n負極：Pb（鉛）\n電解液：希硫酸（H₂SO₄）',explanation:'放電すると両極ともPbSO₄になる。充電で元に戻る。'},
{id:73,category:'aluminum',question:'鉛蓄電池の放電時の各極の変化（反応式）を書け。',answer:'正極：PbO₂ + SO₄²⁻ + 4H⁺ + 2e⁻ → PbSO₄ + 2H₂O\n負極：Pb + SO₄²⁻ → PbSO₄ + 2e⁻',explanation:'放電するほど希硫酸の濃度が薄くなる（PbSO₄が増えてSO₄²⁻が消費される）。'},
{id:74,category:'aluminum',question:'両性金属として代表的な4種を答えよ。',answer:'Al（アルミニウム）・Zn（亜鉛）・Sn（スズ）・Pb（鉛）',explanation:'いずれも酸にもNaOH水溶液にも溶けてH₂を発生する。'},
{id:75,category:'aluminum',question:'PbのNaOH水溶液との反応式を書け。',answer:'Pb + 2NaOH + 2H₂O → Na₂[Pb(OH)₄] + H₂↑',explanation:'Pbも両性金属。Na₂[Pb(OH)₄]はテトラヒドロキシド鉛(II)酸ナトリウム。'},
{id:76,category:'aluminum',question:'Pb(OH)₂の性質を答えよ。',answer:'白色沈殿。両性水酸化物。\n酸にも過剰NaOHにも溶ける。\nPb(OH)₂ + 2NaOH → Na₂[Pb(OH)₄]',explanation:'Pb(OH)₂はAl(OH)₃・Zn(OH)₂と同様に両性水酸化物。'},
{id:77,category:'aluminum',question:'SnCl₂·2H₂Oの用途を答えよ。',answer:'還元剤として利用される（Sn²⁺がSn⁴⁺に酸化されることで酸化剤を還元する）。',explanation:'SnCl₂は還元力が強く、有機化合物の還元やめっきの前処理に使われる。'},
{id:78,category:'aluminum',question:'アルミニウムに関連する「アルマイト」とはどういうものか。',answer:'アルミニウムを陽極酸化して表面のAl₂O₃被膜を人工的に厚くしたもの。耐食性・硬さが向上する。',explanation:'鍋・弁当箱・建材などに利用される。'},
{id:79,category:'aluminum',question:'アルミニウムの合金「ジュラルミン」の成分と特徴を答えよ。',answer:'成分：Al-Cu-Mg合金\n特徴：軽量で高強度',explanation:'航空機・船体・スポーツ用品に利用される。'},
{id:80,category:'aluminum',question:'Alを用いた合金の代表例を2つ（成分・用途）答えよ。',answer:'① ジュラルミン（Al-Cu-Mg）：航空機・軽量高強度材\n② 超硬アルミ合金（Al-Mg-Si等）：建材・自動車',explanation:'Alは軽量なため合金にして強化することで様々な用途に使われる。'},

// 追加：教科書から拾った内容
{id:81,category:'alkali',question:'NaOHの工業的製法を答えよ。',answer:'塩化ナトリウム水溶液のイオン交換膜法電気分解\n陰極：2H₂O + 2e⁻ → H₂↑ + 2OH⁻',explanation:'陽極でCl₂、陰極でH₂とNaOHが得られる。イオン交換膜でNaOHとCl₂が混合しないようにしている。'},
{id:82,category:'alkali',question:'Na₂CO₃（炭酸ナトリウム）の主な工業的用途を3つ答えよ。',answer:'① ガラスの原料\n② 洗剤・石鹸の製造\n③ 製紙（パルプ処理）',explanation:'ソルベー法で大量生産される重要な工業薬品。'},
{id:83,category:'alkali',question:'アルカリ金属が1価の陽イオンになりやすい理由を答えよ。',answer:'最外殻電子が1個だけで、その電子を失うと安定な希ガス型電子配置になるから。',explanation:'イオン化エネルギーが小さく陽イオンになりやすい。'},
{id:84,category:'alkaline',question:'Ca(OH)₂が「消石灰」・CaOが「生石灰」・CaCO₃が「石灰石」と呼ばれる。それぞれの外観の特徴を答えよ。',answer:'石灰石CaCO₃：白色固体（天然鉱物）\n生石灰CaO：白色固体\n消石灰Ca(OH)₂：白色粉末（水溶液が石灰水）',explanation:'石灰の変化：CaCO₃ →（強熱）→ CaO →（水）→ Ca(OH)₂'},
{id:85,category:'alkaline',question:'セメントの主原料と製造方法の概要を答えよ。',answer:'主原料：石灰石（CaCO₃）・粘土・石膏\n概要：石灰石と粘土を混合して高温で焼成しクリンカーにし、石膏を加えて粉砕する',explanation:'水を加えると水和反応で固化する。土木・建築に必須の材料。'},
{id:86,category:'alkaline',question:'MgSO₄・CaSO₄・BaSO₄のそれぞれの水への溶解性を答えよ。',answer:'MgSO₄：水に溶ける\nCaSO₄：わずかに溶ける（難溶）\nBaSO₄：ほとんど溶けない（非常に難溶）',explanation:'原子番号が大きくなるほど硫酸塩は溶けにくくなる。'},
{id:87,category:'alkaline',question:'Mg(OH)₂・Ca(OH)₂・Ba(OH)₂のそれぞれの水への溶解性を答えよ。',answer:'Mg(OH)₂：水にほとんど溶けない\nCa(OH)₂：わずかに溶ける（石灰水）\nBa(OH)₂：よく溶ける（強塩基）',explanation:'原子番号が大きくなるほど水酸化物は溶けやすくなる（硫酸塩と逆の傾向）。'},
{id:88,category:'aluminum',question:'SnO₂（酸化スズ(IV)）の性質を答えよ。',answer:'白色の固体。両性酸化物。\n酸にも塩基にも溶ける。',explanation:'Sn + O₂ → SnO₂。SnO₂は透明電極などにも利用される。'},
{id:89,category:'aluminum',question:'Pb（鉛）の単体の特徴を3つ答えよ。',answer:'① やわらかく加工しやすい金属\n② 密度が大きい（11.4 g/cm³）\n③ X線を遮蔽する性質をもつ',explanation:'融点328℃。放射線遮蔽材・鉛蓄電池・はんだなどに利用。'},
{id:90,category:'aluminum',question:'Pb(NO₃)₂（硝酸鉛(II)）水溶液にNaOH水溶液を加えたときの変化を答えよ。',answer:'白色沈殿Pb(OH)₂が生成する。\nPb²⁺ + 2OH⁻ → Pb(OH)₂↓\n過剰NaOHでは溶解：Pb(OH)₂ + 2OH⁻ → [Pb(OH)₄]²⁻',explanation:'Pb(OH)₂は両性水酸化物。'},
{id:91,category:'alkali',question:'KOH（水酸化カリウム）の特徴を答えよ。',answer:'白色固体。強塩基。潮解性をもつ。\nNaOHと同様に空気中のCO₂を吸収する。',explanation:'石鹸製造（NaOHは固形石鹸、KOHは液体石鹸の原料）に利用。'},
{id:92,category:'alkali',question:'Li（リチウム）の特徴的な物理的性質を答えよ。',answer:'金属中で最も軽い（密度0.53 g/cm³）。\n金属中で最も融点が高いアルカリ金属（181℃）。',explanation:'リチウムイオン電池の負極材料として現代の技術に不可欠。'},
{id:93,category:'alkali',question:'Cs（セシウム）の特徴を答えよ。',answer:'融点が約29℃と低く、常温近くで液体になる。アルカリ金属中最も反応性が高い。',explanation:'原子時計・光電管に利用される。'},
{id:94,category:'alkaline',question:'Ba(OH)₂は何性か。また水への溶解性を答えよ。',answer:'強塩基性。水によく溶ける。',explanation:'Ba²⁺は毒性があるが、BaSO₄は難溶で体内で吸収されないためX線造影剤として安全に使える。'},

const WRONG_KEY='chem_flash1_wrong';
function loadWrongIds(){try{return new Set(JSON.parse(localStorage.getItem(WRONG_KEY)||'[]'));}catch(e){return new Set();}}
function saveWrongIds(s){try{localStorage.setItem(WRONG_KEY,JSON.stringify(Array.from(s)));}catch(e){}}
var wrongIds=loadWrongIds();
var currentFilter='all';

function updateWrongBadge(){
  var cnt=wrongIds.size;
  var el=document.getElementById('wrong-count-badge');
  if(el)el.textContent=cnt;
  var btn=document.getElementById('clear-wrong-btn');
  if(btn)btn.style.display=cnt>0?'':'none';
}
function clearWrongList(){
  if(!confirm('間違えリストをリセットしますか？'))return;
  wrongIds.clear();
  saveWrongIds(wrongIds);
  updateWrongBadge();
  if(currentFilter==='wrong'){filteredQ=[];renderCard();}
}

var filteredQ=ALL_QUESTIONS.slice();
var currentIndex=0,isFlipped=false,correctCount=0,wrongCount=0,answered=new Set();

function setFilter(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  currentFilter=cat;
  if(cat==='all'){filteredQ=ALL_QUESTIONS.slice();}
  else if(cat==='wrong'){filteredQ=ALL_QUESTIONS.filter(function(q){return wrongIds.has(q.id);});}
  else{filteredQ=ALL_QUESTIONS.filter(function(q){return q.category===cat;});}
  restartAll();
}
function shuffleArray(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
}
function shuffleAndReset(){
  shuffleArray(filteredQ);
  currentIndex=0;isFlipped=false;correctCount=0;wrongCount=0;answered.clear();
  document.getElementById('complete-screen').classList.remove('visible');
  document.getElementById('card-area').style.display='';
  document.getElementById('result-btns').classList.remove('visible');
  renderCard();
}
function restartAll(){
  currentIndex=0;isFlipped=false;correctCount=0;wrongCount=0;answered.clear();
  document.getElementById('complete-screen').classList.remove('visible');
  document.getElementById('card-area').style.display='';
  document.getElementById('result-btns').classList.remove('visible');
  renderCard();updateWrongBadge();
}
function renderCard(){
  if(currentIndex>=filteredQ.length){showComplete();return;}
  var q=filteredQ[currentIndex],cat=CATEGORIES[q.category];
  document.getElementById('card-num').textContent='Q '+(currentIndex+1)+' / '+filteredQ.length;
  ['card-badge','card-badge-back'].forEach(function(id){
    var el=document.getElementById(id);
    el.className='card-badge '+cat.cls;
    el.textContent=cat.label;
  });
  document.getElementById('card-question').textContent=q.question;
  document.getElementById('card-answer').textContent=q.answer;
  document.getElementById('card-explanation').textContent=q.explanation;
  document.getElementById('flashcard').classList.remove('flipped');
  isFlipped=false;
  document.getElementById('result-btns').classList.remove('visible');
  updateStats();updateWrongBadge();
}
function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped',isFlipped);
  if(isFlipped)document.getElementById('result-btns').classList.add('visible');
}
function markResult(correct){
  if(!answered.has(currentIndex)){
    answered.add(currentIndex);
    var qid=filteredQ[currentIndex].id;
    if(correct){correctCount++;wrongIds.delete(qid);}
    else{wrongCount++;wrongIds.add(qid);}
    saveWrongIds(wrongIds);updateWrongBadge();
  }
  nextCard();
}
function nextCard(){if(currentIndex<filteredQ.length-1){currentIndex++;renderCard();}else showComplete();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
function updateStats(){
  document.getElementById('stat-total').textContent=filteredQ.length;
  document.getElementById('stat-correct').textContent=correctCount;
  document.getElementById('stat-wrong').textContent=wrongCount;
  document.getElementById('stat-remain').textContent=filteredQ.length-answered.size;
  var pct=filteredQ.length>0?Math.round((answered.size/filteredQ.length)*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=answered.size+' / '+filteredQ.length;
}
function showComplete(){
  document.getElementById('card-area').style.display='none';
  document.getElementById('result-btns').classList.remove('visible');
  var total=answered.size,pct=total>0?Math.round((correctCount/total)*100):0;
  var emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  document.getElementById('complete-emoji').textContent=emoji;
  document.getElementById('complete-score').textContent=correctCount+' / '+total;
  document.getElementById('complete-sub').textContent='正答率 '+pct+'% — '+(pct>=80?'すばらしい！':pct>=60?'もう少し！':'復習しよう！');
  document.getElementById('complete-screen').classList.add('visible');
  updateStats();
}
function toggleTheme(){
  document.body.classList.toggle('light');
  document.querySelector('.theme-toggle').textContent=document.body.classList.contains('light')?'🌙':'☀️';
}

renderCard();
updateWrongBadge();
</script>
