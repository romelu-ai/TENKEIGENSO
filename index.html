<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学フラッシュカード I — 金属元素（典型）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3350;--accent-alkali:#3ecf8e;--accent-alkaline:#a78bfa;--accent-aluminum:#fb923c;--accent:#3ecf8e;--text:#e8eaf0;--text-sub:#8b90a8;--shadow:0 8px 32px rgba(0,0,0,.5)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:20px}
  header{text-align:center;padding:40px 20px 20px}
  header h1{font-family:'Space Mono',monospace;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.1em;color:var(--accent);text-shadow:0 0 20px rgba(62,207,142,.3)}
  header p{color:var(--text-sub);font-size:.9rem;margin-top:6px}
  .filter-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:24px auto;max-width:700px}
  .filter-btn{padding:8px 20px;border-radius:20px;border:2px solid var(--border);background:var(--surface);color:var(--text-sub);font-family:'Noto Sans JP',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s}
  .filter-btn:hover{border-color:var(--accent);color:var(--text)}
  .filter-btn.active{color:#0f1117;font-weight:700}
  .filter-btn[data-cat=alkali].active{background:var(--accent-alkali);border-color:var(--accent-alkali)}
  .filter-btn[data-cat=alkaline].active{background:var(--accent-alkaline);border-color:var(--accent-alkaline)}
  .filter-btn[data-cat=aluminum].active{background:var(--accent-aluminum);border-color:var(--accent-aluminum)}
  .filter-btn[data-cat=all].active{background:var(--accent);border-color:var(--accent)}
  .stats-bar{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:0 auto 28px;max-width:700px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 20px;text-align:center;min-width:90px}
  .stat-num{font-family:'Space Mono',monospace;font-size:1.4rem;color:var(--accent)}
  .stat-label{font-size:.75rem;color:var(--text-sub);margin-top:2px}
  .progress-wrap{max-width:700px;margin:0 auto 20px}
  .progress-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-alkali),var(--accent-alkaline));border-radius:2px;transition:width .4s ease}
  .progress-text{text-align:right;font-size:.75rem;color:var(--text-sub);margin-top:6px;font-family:'Space Mono',monospace}
  .card-area{max-width:700px;margin:0 auto;perspective:1200px}
  .flashcard{width:100%;min-height:320px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1)}
  .flashcard.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);min-height:320px}
  .card-face.back{transform:rotateY(180deg)}
  .card-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-family:'Space Mono',monospace;padding:4px 12px;border-radius:20px;margin-bottom:20px;width:fit-content}
  .badge-alkali{background:rgba(62,207,142,.15);color:var(--accent-alkali);border:1px solid rgba(62,207,142,.3)}
  .badge-alkaline{background:rgba(167,139,250,.15);color:var(--accent-alkaline);border:1px solid rgba(167,139,250,.3)}
  .badge-aluminum{background:rgba(251,146,60,.15);color:var(--accent-aluminum);border:1px solid rgba(251,146,60,.3)}
  .card-num{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--text-sub);margin-bottom:16px}
  .card-question{font-size:clamp(1rem,2.5vw,1.2rem);font-weight:700;line-height:1.7;color:var(--text)}
  .card-hint{margin-top:24px;font-size:.8rem;color:var(--text-sub);display:flex;align-items:center;gap:6px}
  .card-hint::before{content:"▶";font-size:.7rem}
  .card-answer{font-size:clamp(1rem,2.5vw,1.15rem);font-weight:700;line-height:1.8;color:var(--accent);white-space:pre-line;margin-bottom:16px}
  .card-explanation{font-size:.85rem;color:var(--text-sub);line-height:1.7;border-top:1px solid var(--border);padding-top:14px;margin-top:8px}
  .result-btns{display:none;gap:12px;justify-content:center;margin:0 auto 12px;max-width:700px}
  .result-btns.visible{display:flex}
  .controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px auto;max-width:700px}
  .btn{padding:12px 28px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
  .btn-primary{background:var(--accent);color:#0f1117}
  .btn-primary:hover{filter:brightness(1.15);transform:translateY(-2px)}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
  .btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
  .btn-danger:hover{background:rgba(239,68,68,.25);transform:translateY(-2px)}
  .btn-correct{background:rgba(62,207,142,.15);color:var(--accent-alkali);border:1px solid rgba(62,207,142,.3)}
  .btn-correct:hover{background:rgba(62,207,142,.3);transform:translateY(-2px)}
  .btn-wrong{background:rgba(251,146,60,.15);color:var(--accent-aluminum);border:1px solid rgba(251,146,60,.3)}
  .btn-wrong:hover{background:rgba(251,146,60,.3);transform:translateY(-2px)}
  .complete-screen{display:none;text-align:center;max-width:500px;margin:40px auto;padding:48px 32px;background:var(--card);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}
  .complete-screen.visible{display:block}
  .complete-emoji{font-size:4rem;margin-bottom:16px}
  .complete-title{font-family:'Space Mono',monospace;font-size:1.5rem;color:var(--accent);margin-bottom:12px}
  .complete-score{font-size:3rem;font-weight:700;color:var(--text);margin:16px 0;font-family:'Space Mono',monospace}
  .complete-sub{color:var(--text-sub);font-size:.9rem}
  .theme-toggle{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);color:var(--text-sub);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
  body.light{--bg:#f4f6fb;--surface:#fff;--card:#fff;--border:#e2e6f0;--text:#1a1d27;--text-sub:#6b7280;--shadow:0 8px 32px rgba(0,0,0,.1)}
  @media(max-width:480px){.card-face{padding:24px 20px}.btn{padding:10px 18px;font-size:.85rem}}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
<header>
  <h1>⚗ CHEMISTRY FLASH I</h1>
  <p>第2編 金属元素（典型元素） — 全70問</p>
</header>
<div class="filter-bar">
  <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" data-cat="alkali" onclick="setFilter('alkali',this)">アルカリ金属</button>
  <button class="filter-btn" data-cat="alkaline" onclick="setFilter('alkaline',this)">アルカリ土類金属</button>
  <button class="filter-btn" data-cat="aluminum" onclick="setFilter('aluminum',this)">Al・Sn・Pb</button>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">合計</div></div>
  <div class="stat"><div class="stat-num" id="stat-correct" style="color:var(--accent-alkali)">0</div><div class="stat-label">正解</div></div>
  <div class="stat"><div class="stat-num" id="stat-wrong" style="color:var(--accent-aluminum)">0</div><div class="stat-label">不正解</div></div>
  <div class="stat"><div class="stat-num" id="stat-remain" style="color:var(--accent-alkaline)">0</div><div class="stat-label">残り</div></div>
</div>
<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-text" id="progress-text">0 / 0</div>
</div>
<div class="card-area" id="card-area">
  <div class="flashcard" id="flashcard" onclick="flipCard()">
    <div class="card-face front">
      <div class="card-num" id="card-num"></div>
      <div class="card-badge" id="card-badge"></div>
      <div class="card-question" id="card-question"></div>
      <div class="card-hint">タップして答えを確認</div>
    </div>
    <div class="card-face back">
      <div class="card-badge" id="card-badge-back"></div>
      <div class="card-answer" id="card-answer"></div>
      <div class="card-explanation" id="card-explanation"></div>
    </div>
  </div>
</div>
<div class="result-btns" id="result-btns">
  <button class="btn btn-wrong" onclick="markResult(false)">✗ もう一度</button>
  <button class="btn btn-correct" onclick="markResult(true)">✓ 正解！</button>
</div>
<div class="controls">
  <button class="btn btn-secondary" onclick="prevCard()">← 前へ</button>
  <button class="btn btn-primary" onclick="nextCard()">次へ →</button>
  <button class="btn btn-danger" onclick="shuffleAndReset()">🔀 シャッフル</button>
</div>
<div class="complete-screen" id="complete-screen">
  <div class="complete-emoji" id="complete-emoji">🎉</div>
  <div class="complete-title">COMPLETE!</div>
  <div class="complete-score" id="complete-score"></div>
  <div class="complete-sub" id="complete-sub"></div>
  <br><br>
  <button class="btn btn-primary" onclick="restartAll()" style="margin:auto">もう一度挑戦</button>
</div>
<script>
const CATEGORIES={alkali:{label:'アルカリ金属',cls:'badge-alkali'},alkaline:{label:'アルカリ土類金属',cls:'badge-alkaline'},aluminum:{label:'Al・Sn・Pb',cls:'badge-aluminum'}};
const ALL_QUESTIONS=[
// ── アルカリ金属：族・元素 ──
{id:1,category:'alkali',question:`アルカリ金属は何族の元素か。`,answer:`第1族元素（水素を除く）`,explanation:`Li・Na・K・Rb・Cs・Frが含まれる。`},
{id:2,category:'alkali',question:`アルカリ金属に含まれる元素を原子番号順に全て答えよ。`,answer:`Li（リチウム）、Na（ナトリウム）、K（カリウム）、Rb（ルビジウム）、Cs（セシウム）、Fr（フランシウム）`,explanation:`価電子が1個。全て1族（水素を除く）。`},
{id:3,category:'alkali',question:`アルカリ金属を石油中に保存する理由を答えよ。`,answer:`空気中の水分・酸素と激しく反応するため、石油中に保存して空気と遮断する。`,explanation:`Na、Kなどは空気中に放置すると酸化・発火の危険がある。`},
{id:4,category:'alkali',question:`アルカリ金属の物理的性質①：硬さはどうか。`,answer:`軟らかい。ナイフで切ることができる。`,explanation:`金属の中では非常に柔らかい部類。`},
{id:5,category:'alkali',question:`アルカリ金属の物理的性質②：融点と密度は他の金属と比べてどうか。`,answer:`融点が低く、密度が小さい（軽い）。
Li・Na・Kは水より密度が小さく、水に浮く。`,explanation:`典型的な金属（Fe・Cuなど）に比べ融点・密度ともに低い。`},
{id:6,category:'alkali',question:`アルカリ金属の化学的性質①：反応性は原子番号が大きくなるとどう変化するか。`,answer:`原子番号が大きいほど反応性が強くなる。
Li < Na < K < Rb < Cs の順に強い。`,explanation:`原子番号が大きいほどイオン化エネルギーが小さく、陽イオンになりやすい。`},
{id:7,category:'alkali',question:`アルカリ金属の化学的性質②：水との反応の特徴を答えよ。`,answer:`水と反応してH₂を発生し、水酸化物の水溶液（強塩基）を生じる。
反応式：2M + 2H₂O → 2MOH + H₂↑`,explanation:`Mはアルカリ金属。K以降は発火しながら激しく反応する。`},
{id:8,category:'alkali',question:`Naと水の反応式を書け。`,answer:`2Na + 2H₂O → 2NaOH + H₂↑`,explanation:`NaOHは強塩基。H₂が発生し発火することもある。`},
{id:9,category:'alkali',question:`Naを空気中で穏やかに燃焼させたときの生成物と反応式を書け。`,answer:`4Na + O₂ → 2Na₂O（酸化ナトリウム）`,explanation:`穏やかな条件でNa₂Oが生成する。`},
{id:10,category:'alkali',question:`Naを過剰な酸素中で燃焼させたときの生成物と反応式を書け。`,answer:`2Na + O₂ → Na₂O₂（過酸化ナトリウム）`,explanation:`Na₂O₂は酸化剤・漂白剤として使われる。水と反応してH₂O₂を生じる。`},
{id:11,category:'alkali',question:`NaOHの色・状態を答えよ。`,answer:`白色固体`,explanation:`水に非常によく溶けて強塩基性を示す。`},
{id:12,category:'alkali',question:`NaOHの「潮解性」とはどういう性質か。`,answer:`空気中の水分を吸収して自ら溶けていく性質。`,explanation:`NaOHは潮解性をもつため密封保存が必要。`},
{id:13,category:'alkali',question:`NaOHが空気中のCO₂（少量）を吸収する反応式を書け。`,answer:`2NaOH + CO₂ → Na₂CO₃ + H₂O`,explanation:`CO₂が少量の場合はNa₂CO₃（炭酸ナトリウム）が生成する。`},
{id:14,category:'alkali',question:`NaOHが空気中のCO₂（過剰）を吸収する反応式を書け。`,answer:`NaOH + CO₂ → NaHCO₃`,explanation:`CO₂が過剰の場合はNaHCO₃（炭酸水素ナトリウム）が生成する。`},
{id:15,category:'alkali',question:`Na₂CO₃と希塩酸HClの反応式を書け。`,answer:`Na₂CO₃ + 2HCl → 2NaCl + H₂O + CO₂↑`,explanation:`弱酸の塩に強酸を加えると弱酸が遊離する反応。CO₂発生。`},
{id:16,category:'alkali',question:`NaHCO₃と希塩酸HClの反応式を書け。`,answer:`NaHCO₃ + HCl → NaCl + H₂O + CO₂↑`,explanation:`ベーキングパウダー・重曹の主成分。胃薬にも利用。`},
{id:17,category:'alkali',question:`NaHCO₃を加熱したときの熱分解反応式を書け。`,answer:`2NaHCO₃ → Na₂CO₃ + H₂O + CO₂↑`,explanation:`ケーキが膨らむ原理。Na₂CO₃（炭酸ナトリウム）が残る。`},
{id:18,category:'alkali',question:`ソルベー法の主反応式を書け。`,answer:`NaCl + NH₃ + H₂O + CO₂ → NaHCO₃↓ + NH₄Cl`,explanation:`飽和食塩水にNH₃とCO₂を吹き込むとNaHCO₃が先に沈殿する。`},
{id:19,category:'alkali',question:`ソルベー法でNaHCO₃をNa₂CO₃に変える工程の反応式を書け。`,answer:`2NaHCO₃ → Na₂CO₃ + H₂O + CO₂↑（加熱）`,explanation:`生成したNa₂CO₃はガラス・洗剤・製紙の原料として重要。`},
{id:20,category:'alkali',question:`Na₂CO₃·10H₂Oの俗称を答えよ。`,answer:`洗濯ソーダ`,explanation:`炭酸ナトリウム十水和物。洗浄剤として利用されてきた。`},
{id:21,category:'alkali',question:`「風解」とはどういう現象か。Na₂CO₃·10H₂Oを例に答えよ。`,answer:`結晶が空気中で結晶水を失い粉末状になる現象。
Na₂CO₃·10H₂O → Na₂CO₃·H₂O + 9H₂O`,explanation:`乾燥空気中に放置すると起こる。`},
{id:22,category:'alkali',question:`石灰水（Ca(OH)₂水溶液）にCO₂を少量通じたときの反応式を書け。`,answer:`Ca(OH)₂ + CO₂ → CaCO₃↓ + H₂O`,explanation:`白色沈殿CaCO₃が生じ石灰水が白濁する。CO₂の検出に使用。`},
{id:23,category:'alkali',question:`石灰水にCO₂を過剰に通じると白濁が消える。その反応式を書け。`,answer:`CaCO₃ + H₂O + CO₂ → Ca(HCO₃)₂`,explanation:`可溶性のCa(HCO₃)₂が生成して沈殿が溶けるため白濁が消える。`},
{id:24,category:'alkali',question:`炎色反応でNaは何色か。`,answer:`黄色（橙黄色）`,explanation:`Naは非常に鮮明な黄色を示す。微量でも検出できる。`},
{id:25,category:'alkali',question:`炎色反応でKは何色か。`,answer:`紫色`,explanation:`カリウムは紫色の炎色反応を示す。`},
{id:26,category:'alkali',question:`炎色反応でLiは何色か。`,answer:`赤色`,explanation:`リチウムは赤色の炎色反応を示す。花火の赤色に利用。`},
// ── アルカリ土類金属 ──
{id:27,category:'alkaline',question:`アルカリ土類金属は何族の元素か。`,answer:`第2族元素`,explanation:`Be・Mg・Ca・Sr・Ba・Raが含まれる。価電子2個。`},
{id:28,category:'alkaline',question:`アルカリ土類金属に含まれる元素を原子番号順に全て答えよ。`,answer:`Be（ベリリウム）・Mg（マグネシウム）・Ca（カルシウム）・Sr（ストロンチウム）・Ba（バリウム）・Ra（ラジウム）`,explanation:`価電子2個。Ca以降は冷水と反応する。`},
{id:29,category:'alkaline',question:`アルカリ土類金属のうち冷水と反応しないものはどれか。理由も答えよ。`,answer:`BeとMg。
理由：表面に緻密な酸化被膜が形成され内部が保護されるから。`,explanation:`MgはCaと異なり冷水に反応しない。熱水や酸には溶ける。`},
{id:30,category:'alkaline',question:`Mgと酸素の反応式を書け。`,answer:`2Mg + O₂ → 2MgO`,explanation:`白色の強い光を放って燃焼する。花火・フラッシュ照明に利用。`},
{id:31,category:'alkaline',question:`Mgを空気中で燃焼させると何色の光が出るか。何に利用されるか。`,answer:`白色の強い光。
利用：花火・フラッシュ照明・発炎筒`,explanation:`MgO（白色固体）が生成する。`},
{id:32,category:'alkaline',question:`Mgと熱水の反応式を書け。`,answer:`Mg + 2H₂O → Mg(OH)₂ + H₂↑`,explanation:`冷水とはほぼ反応しないが、熱水とは反応する。`},
{id:33,category:'alkaline',question:`Caと冷水の反応式を書け。`,answer:`Ca + 2H₂O → Ca(OH)₂ + H₂↑`,explanation:`Ca(OH)₂（消石灰）が生成。石灰水の主成分で弱塩基性。`},
{id:34,category:'alkaline',question:`CaO（生石灰）と水の反応式を書け。`,answer:`CaO + H₂O → Ca(OH)₂`,explanation:`発熱反応。Ca(OH)₂（消石灰）が生成する。乾燥剤・土壌改良材に利用。`},
{id:35,category:'alkaline',question:`CaO（生石灰）が水と反応するときの熱的な特徴を答えよ。`,answer:`激しく発熱する（発熱反応）。`,explanation:`携帯カイロや食品の加熱パックに利用される原理。`},
{id:36,category:'alkaline',question:`Ca(OH)₂を加熱したときの反応式を書け。`,answer:`Ca(OH)₂ → CaO + H₂O`,explanation:`加熱による脱水分解。CaO（生石灰）に戻る。`},
{id:37,category:'alkaline',question:`CaCO₃（石灰石）を強熱したときの反応式を書け。`,answer:`CaCO₃ → CaO + CO₂↑`,explanation:`約900℃以上で熱分解。セメント・石灰製造の基本反応。`},
{id:38,category:'alkaline',question:`CaCO₃に希塩酸を加えたときの反応式を書け。`,answer:`CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂↑`,explanation:`石灰石・大理石・貝殻に塩酸を加えるとCO₂が発生する。`},
{id:39,category:'alkaline',question:`Ca(HCO₃)₂水溶液を加熱したときの反応式を書け。また自然界での例を答えよ。`,answer:`Ca(HCO₃)₂ → CaCO₃↓ + H₂O + CO₂↑
自然界：鍾乳洞・鍾乳石の形成`,explanation:`地下水中のCa(HCO₃)₂が洞窟内でCaCO₃として析出する。`},
{id:40,category:'alkaline',question:`CaSO₄·2H₂O（石膏）を約130℃で加熱したときの生成物と反応式を書け。`,answer:`CaSO₄·2H₂O → CaSO₄·½H₂O（焼き石膏）+ 3/2 H₂O`,explanation:`焼き石膏は水を加えると固化するため型取り・ギプス・建築材料に利用。`},
{id:41,category:'alkaline',question:`焼き石膏（CaSO₄·½H₂O）に水を加えたときの反応式と特徴を答えよ。`,answer:`CaSO₄·½H₂O + 3/2 H₂O → CaSO₄·2H₂O
特徴：発熱しながら固化する`,explanation:`医療用ギプス・建築材料として利用される原理。`},
{id:42,category:'alkaline',question:`Ba²⁺の確認反応：試薬・反応式・沈殿の色を答えよ。`,answer:`試薬：希硫酸（SO₄²⁻）
Ba²⁺ + SO₄²⁻ → BaSO₄↓（白色沈殿）`,explanation:`BaSO₄は水にも酸にも溶けない。X線造影剤（バリウム検査）に利用。`},
{id:43,category:'alkaline',question:`炎色反応でCaは何色か。`,answer:`橙赤色`,explanation:`カルシウムは橙赤色の炎色反応を示す。`},
{id:44,category:'alkaline',question:`炎色反応でSrは何色か。`,answer:`赤色（深赤色）`,explanation:`ストロンチウムは赤色の炎色反応を示す。花火の赤色に利用される。`},
{id:45,category:'alkaline',question:`炎色反応でBaは何色か。`,answer:`黄緑色`,explanation:`バリウムは黄緑色の炎色反応を示す。`},
// ── アルミニウム ──
{id:46,category:'aluminum',question:`Alの原料鉱石の名称と化学式を答えよ。`,answer:`ボーキサイト（Al₂O₃·nH₂O）`,explanation:`アルミナ（Al₂O₃）を精製したうえで溶融塩電解する。`},
{id:47,category:'aluminum',question:`Alの工業的製錬法の名称と概要を答えよ。`,answer:`ホール・エルー法（溶融塩電解）
概要：アルミナ（Al₂O₃）を氷晶石（Na₃AlF₆）に溶かして電気分解する`,explanation:`大量の電力を消費するため「電気の缶詰」と呼ばれる。`},
{id:48,category:'aluminum',question:`Alの不動態とはどういう状態か。反応式も書け。`,answer:`表面に緻密なAl₂O₃の酸化被膜が形成され、内部を保護する状態。
4Al + 3O₂ → 2Al₂O₃`,explanation:`アルマイトは陽極酸化でこの被膜を人工的に厚くしたもの。濃硝酸・濃硫酸でも不動態になる。`},
{id:49,category:'aluminum',question:`Alと希塩酸HClの反応式を書け。`,answer:`2Al + 6HCl → 2AlCl₃ + 3H₂↑`,explanation:`AlはH₂よりイオン化傾向が大きいため酸に溶けてH₂を発生する。`},
{id:50,category:'aluminum',question:`Alと水酸化ナトリウムNaOH水溶液の反応式を書け。`,answer:`2Al + 2NaOH + 2H₂O → 2NaAl(OH)₄ + 3H₂↑`,explanation:`Alが両性金属であることを示す反応。NaAlO₂ + H₂↑と書く場合もある。`},
{id:51,category:'aluminum',question:`テルミット反応の反応式を書け。`,answer:`2Al + Fe₂O₃ → Al₂O₃ + 2Fe`,explanation:`AlはFeよりイオン化傾向が大きいためFe₂O₃を還元する。約3000℃の高熱を発生する。`},
{id:52,category:'aluminum',question:`テルミット反応はどのような場面で利用されるか。`,answer:`鉄道レールの現場溶接（テルミット溶接）に利用される。`,explanation:`高熱で鉄を溶かして接合する。`},
{id:53,category:'aluminum',question:`Al(OH)₃と希塩酸の反応式を書け。`,answer:`Al(OH)₃ + 3HCl → AlCl₃ + 3H₂O`,explanation:`Al(OH)₃の酸に溶ける性質（両性水酸化物の酸側）。`},
{id:54,category:'aluminum',question:`Al(OH)₃とNaOH水溶液の反応式を書け。`,answer:`Al(OH)₃ + NaOH → NaAl(OH)₄`,explanation:`NaAlO₂ + 2H₂O とも書く。Al(OH)₃の塩基に溶ける性質。`},
{id:55,category:'aluminum',question:`AlCl₃水溶液にNH₃水を加えたときの反応式を書け。`,answer:`AlCl₃ + 3NH₃ + 3H₂O → Al(OH)₃↓ + 3NH₄Cl`,explanation:`白色のAl(OH)₃が沈殿する。`},
{id:56,category:'aluminum',question:`Al(OH)₃はNH₃水を過剰に加えても溶けない。理由を答えよ。`,answer:`NH₃水は弱塩基であり、Al(OH)₃を溶かすほどの塩基性がないから。（NaOH水溶液なら溶ける）`,explanation:`Fe(OH)₃も同様にNH₃水過剰では溶けない。これはAl³⁺とFe³⁺を他の金属イオンと区別する点。`},
{id:57,category:'aluminum',question:`Al₂O₃と希塩酸の反応式を書け。`,answer:`Al₂O₃ + 6HCl → 2AlCl₃ + 3H₂O`,explanation:`Al₂O₃は両性酸化物の酸側の反応。`},
{id:58,category:'aluminum',question:`Al₂O₃とNaOH水溶液の反応式を書け。`,answer:`Al₂O₃ + 2NaOH + 3H₂O → 2NaAl(OH)₄`,explanation:`Al₂O₃は両性酸化物の塩基側の反応。`},
{id:59,category:'aluminum',question:`ミョウバンの化学式と正式名称を答えよ。`,answer:`化学式：AlK(SO₄)₂·12H₂O
正式名称：硫酸アルミニウムカリウム十二水和物`,explanation:`複塩。正八面体の結晶形をもつ。`},
{id:60,category:'aluminum',question:`ミョウバンの主な用途を2つ答えよ。`,answer:`媒染剤（染色時の色止め）・浄水剤`,explanation:`水に溶かすとAl³⁺が加水分解してAl(OH)₃のコロイドを形成し、不純物を吸着して沈殿させる。`},
// ── スズ・鉛 ──
{id:61,category:'aluminum',question:`スズSnの代表的な酸化数を2つ答えよ。`,answer:`+2（Sn²⁺）と+4（Sn⁴⁺）`,explanation:`SnCl₂は+2、SnCl₄は+4の酸化数をもつ。`},
{id:62,category:'aluminum',question:`ブリキとはどういうものか。また傷がつくと腐食しやすい理由を答えよ。`,answer:`鉄板にスズ（Sn）をめっきしたもの。
理由：SnのイオンカFe傾向がFeより小さく、傷がつくとFeが先に酸化されるから。`,explanation:`缶詰などに使われるが、傷に弱い欠点がある。`},
{id:63,category:'aluminum',question:`トタンとはどういうものか。傷がついても腐食しにくい理由を答えよ。`,answer:`鉄板に亜鉛（Zn）をめっきしたもの。
理由：ZnのイオンカFe傾向がFeより大きく、傷がつくとZnが先に溶けてFeを保護するから。`,explanation:`屋根・外壁材に使われる。犠牲防食の原理。`},
{id:64,category:'aluminum',question:`鉛Pbの代表的な酸化数を2つ答えよ。`,answer:`+2（Pb²⁺）と+4（Pb⁴⁺）`,explanation:`Pb²⁺が安定。PbO₂（+4）は鉛蓄電池の正極として重要。`},
{id:65,category:'aluminum',question:`Pb²⁺に希硫酸を加えたときの反応式と沈殿の色を答えよ。`,answer:`Pb²⁺ + SO₄²⁻ → PbSO₄↓（白色沈殿）`,explanation:`PbSO₄は難溶性。Pb²⁺の確認反応。`},
{id:66,category:'aluminum',question:`Pb²⁺に希塩酸を加えたときの反応式と沈殿の色を答えよ。`,answer:`Pb²⁺ + 2Cl⁻ → PbCl₂↓（白色沈殿）`,explanation:`PbCl₂は冷水に難溶、熱水に溶ける。Ag⁺との分離に利用。`},
{id:67,category:'aluminum',question:`鉛蓄電池の正極・負極の物質を答えよ。`,answer:`正極：PbO₂（二酸化鉛）
負極：Pb（鉛）`,explanation:`電解液は希硫酸H₂SO₄。放電すると両極ともPbSO₄になる。`},
{id:68,category:'aluminum',question:`鉛蓄電池の電解液を答えよ。`,answer:`希硫酸（H₂SO₄）`,explanation:`充電すると希硫酸の濃度が戻る（放電すると薄くなる）。`},
{id:69,category:'aluminum',question:`両性金属として代表的な4種を答えよ。`,answer:`Al（アルミニウム）・Zn（亜鉛）・Sn（スズ）・Pb（鉛）`,explanation:`いずれも酸にもNaOH水溶液にも溶けてH₂を発生する。`},
{id:70,category:'aluminum',question:`Alと希硫酸H₂SO₄の反応式を書け。`,answer:`2Al + 3H₂SO₄ → Al₂(SO₄)₃ + 3H₂↑`,explanation:`Alは希硫酸に溶けてH₂を発生する。ただし濃硫酸・濃硝酸では不動態になり溶けない。`},
];

let filteredQ=[...ALL_QUESTIONS],currentIndex=0,isFlipped=false,correctCount=0,wrongCount=0,answered=new Set();
function setFilter(cat,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filteredQ=cat==='all'?[...ALL_QUESTIONS]:ALL_QUESTIONS.filter(q=>q.category===cat);restartAll();}
function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function shuffleAndReset(){shuffleArray(filteredQ);currentIndex=0;isFlipped=false;correctCount=0;wrongCount=0;answered.clear();document.getElementById('complete-screen').classList.remove('visible');document.getElementById('card-area').style.display='';document.getElementById('result-btns').classList.remove('visible');renderCard();}
function restartAll(){currentIndex=0;isFlipped=false;correctCount=0;wrongCount=0;answered.clear();document.getElementById('complete-screen').classList.remove('visible');document.getElementById('card-area').style.display='';document.getElementById('result-btns').classList.remove('visible');renderCard();}
function renderCard(){
  if(currentIndex>=filteredQ.length){showComplete();return;}
  const q=filteredQ[currentIndex],cat=CATEGORIES[q.category];
  document.getElementById('card-num').textContent=`Q ${currentIndex+1} / ${filteredQ.length}`;
  ['card-badge','card-badge-back'].forEach(id=>{const el=document.getElementById(id);el.className=`card-badge ${cat.cls}`;el.textContent=cat.label;});
  document.getElementById('card-question').textContent=q.question;
  document.getElementById('card-answer').textContent=q.answer;
  document.getElementById('card-explanation').textContent=q.explanation;
  document.getElementById('flashcard').classList.remove('flipped');
  isFlipped=false;document.getElementById('result-btns').classList.remove('visible');
  updateStats();
}
function flipCard(){isFlipped=!isFlipped;document.getElementById('flashcard').classList.toggle('flipped',isFlipped);if(isFlipped)document.getElementById('result-btns').classList.add('visible');}
function markResult(correct){if(!answered.has(currentIndex)){answered.add(currentIndex);if(correct)correctCount++;else wrongCount++;}nextCard();}
function nextCard(){if(currentIndex<filteredQ.length-1){currentIndex++;renderCard();}else showComplete();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
function updateStats(){
  document.getElementById('stat-total').textContent=filteredQ.length;
  document.getElementById('stat-correct').textContent=correctCount;
  document.getElementById('stat-wrong').textContent=wrongCount;
  document.getElementById('stat-remain').textContent=filteredQ.length-answered.size;
  const pct=filteredQ.length>0?Math.round((answered.size/filteredQ.length)*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${answered.size} / ${filteredQ.length}`;
}
function showComplete(){
  document.getElementById('card-area').style.display='none';
  document.getElementById('result-btns').classList.remove('visible');
  const total=answered.size,pct=total>0?Math.round((correctCount/total)*100):0;
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  document.getElementById('complete-emoji').textContent=emoji;
  document.getElementById('complete-score').textContent=`${correctCount} / ${total}`;
  document.getElementById('complete-sub').textContent=`正答率 ${pct}% — ${pct>=80?'すばらしい！':pct>=60?'もう少し！':'復習しよう！'}`;
  document.getElementById('complete-screen').classList.add('visible');
  updateStats();
}
function toggleTheme(){document.body.classList.toggle('light');document.querySelector('.theme-toggle').textContent=document.body.classList.contains('light')?'🌙':'☀️';}
renderCard();
</script>
