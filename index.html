<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学フラッシュカード I — 金属元素（典型）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3350;--accent-alkali:#3ecf8e;--accent-alkaline:#a78bfa;--accent-aluminum:#fb923c;--accent:#3ecf8e;--text:#e8eaf0;--text-sub:#8b90a8;--shadow:0 8px 32px rgba(0,0,0,.5)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding:20px}
  header{text-align:center;padding:40px 20px 20px}
  header h1{font-family:'Space Mono',monospace;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.1em;color:var(--accent);text-shadow:0 0 20px rgba(62,207,142,.3)}
  header p{color:var(--text-sub);font-size:.9rem;margin-top:6px}
  .filter-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:24px auto;max-width:760px}
  .filter-btn{padding:8px 20px;border-radius:20px;border:2px solid var(--border);background:var(--surface);color:var(--text-sub);font-family:'Noto Sans JP',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s}
  .filter-btn:hover{border-color:var(--accent);color:var(--text)}
  .filter-btn.active{color:#0f1117;font-weight:700}
  .filter-btn[data-cat=alkali].active{background:var(--accent-alkali);border-color:var(--accent-alkali)}
  .filter-btn[data-cat=alkaline].active{background:var(--accent-alkaline);border-color:var(--accent-alkaline)}
  .filter-btn[data-cat=aluminum].active{background:var(--accent-aluminum);border-color:var(--accent-aluminum)}
  .filter-btn[data-cat=all].active{background:var(--accent);border-color:var(--accent)}
  .filter-btn[data-cat=wrong].active{background:#ef4444;border-color:#ef4444;color:#fff}
  .stats-bar{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:0 auto 28px;max-width:700px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 20px;text-align:center;min-width:90px}
  .stat-num{font-family:'Space Mono',monospace;font-size:1.4rem;color:var(--accent)}
  .stat-label{font-size:.75rem;color:var(--text-sub);margin-top:2px}
  .progress-wrap{max-width:700px;margin:0 auto 20px}
  .progress-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-alkali),var(--accent-alkaline));border-radius:2px;transition:width .4s ease}
  .progress-text{text-align:right;font-size:.75rem;color:var(--text-sub);margin-top:6px;font-family:'Space Mono',monospace}
  .card-area{max-width:700px;margin:0 auto;perspective:1200px}
  .flashcard{width:100%;min-height:320px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1)}
  .flashcard.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);min-height:320px}
  .card-face.back{transform:rotateY(180deg)}
  .card-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-family:'Space Mono',monospace;padding:4px 12px;border-radius:20px;margin-bottom:20px;width:fit-content}
  .badge-alkali{background:rgba(62,207,142,.15);color:var(--accent-alkali);border:1px solid rgba(62,207,142,.3)}
  .badge-alkaline{background:rgba(167,139,250,.15);color:var(--accent-alkaline);border:1px solid rgba(167,139,250,.3)}
  .badge-aluminum{background:rgba(251,146,60,.15);color:var(--accent-aluminum);border:1px solid rgba(251,146,60,.3)}
  .card-num{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--text-sub);margin-bottom:16px}
  .card-question{font-size:clamp(1rem,2.5vw,1.2rem);font-weight:700;line-height:1.7;color:var(--text)}
  .card-hint{margin-top:24px;font-size:.8rem;color:var(--text-sub);display:flex;align-items:center;gap:6px}
  .card-hint::before{content:"▶";font-size:.7rem}
  .card-answer{font-size:clamp(1rem,2.5vw,1.15rem);font-weight:700;line-height:1.8;color:var(--accent);white-space:pre-line;margin-bottom:16px}
  .card-explanation{font-size:.85rem;color:var(--text-sub);line-height:1.7;border-top:1px solid var(--border);padding-top:14px;margin-top:8px}
  .result-btns{display:none;gap:12px;justify-content:center;margin:0 auto 12px;max-width:700px}
  .result-btns.visible{display:flex}
  .controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px auto;max-width:700px}
  .btn{padding:12px 28px;border-radius:12px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
  .btn-primary{background:var(--accent);color:#0f1117}
  .btn-primary:hover{filter:brightness(1.15);transform:translateY(-2px)}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
  .btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
  .btn-danger:hover{background:rgba(239,68,68,.25);transform:translateY(-2px)}
  .btn-correct{background:rgba(62,207,142,.15);color:var(--accent-alkali);border:1px solid rgba(62,207,142,.3)}
  .btn-correct:hover{background:rgba(62,207,142,.3);transform:translateY(-2px)}
  .btn-wrong{background:rgba(251,146,60,.15);color:var(--accent-aluminum);border:1px solid rgba(251,146,60,.3)}
  .btn-wrong:hover{background:rgba(251,146,60,.3);transform:translateY(-2px)}
  .complete-screen{display:none;text-align:center;max-width:500px;margin:40px auto;padding:48px 32px;background:var(--card);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow)}
  .complete-screen.visible{display:block}
  .complete-emoji{font-size:4rem;margin-bottom:16px}
  .complete-title{font-family:'Space Mono',monospace;font-size:1.5rem;color:var(--accent);margin-bottom:12px}
  .complete-score{font-size:3rem;font-weight:700;color:var(--text);margin:16px 0;font-family:'Space Mono',monospace}
  .complete-sub{color:var(--text-sub);font-size:.9rem}
  .theme-toggle{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);color:var(--text-sub);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
  body.light{--bg:#f4f6fb;--surface:#fff;--card:#fff;--border:#e2e6f0;--text:#1a1d27;--text-sub:#6b7280;--shadow:0 8px 32px rgba(0,0,0,.1)}
  @media(max-width:480px){.card-face{padding:24px 20px}.btn{padding:10px 18px;font-size:.85rem}}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>
<header>
  <h1>⚗ CHEMISTRY FLASH I</h1>
  <p>第2編 金属元素（典型元素） — 全83問</p>
</header>
<div class="filter-bar">
  <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">すべて</button>
  <button class="filter-btn" data-cat="alkali" onclick="setFilter('alkali',this)">アルカリ金属</button>
  <button class="filter-btn" data-cat="alkaline" onclick="setFilter('alkaline',this)">アルカリ土類金属</button>
  <button class="filter-btn" data-cat="aluminum" onclick="setFilter('aluminum',this)">Al・Sn・Pb</button>
  <button class="filter-btn" data-cat="wrong" onclick="setFilter('wrong',this)">❌ 間違えた問題 <span id="wrong-count-badge" style="margin-left:4px;background:rgba(239,68,68,.25);color:#f87171;border-radius:10px;padding:1px 7px;font-size:.75rem">0</span></button>
  <button class="filter-btn" id="clear-wrong-btn" onclick="clearWrongList()" style="border-color:rgba(239,68,68,.3);color:#f87171;display:none">🗑 リセット</button>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">合計</div></div>
  <div class="stat"><div class="stat-num" id="stat-correct" style="color:var(--accent-alkali)">0</div><div class="stat-label">正解</div></div>
  <div class="stat"><div class="stat-num" id="stat-wrong" style="color:var(--accent-aluminum)">0</div><div class="stat-label">不正解</div></div>
  <div class="stat"><div class="stat-num" id="stat-remain" style="color:var(--accent-alkaline)">0</div><div class="stat-label">残り</div></div>
</div>
<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="progress-text" id="progress-text">0 / 0</div>
</div>
<div class="card-area" id="card-area">
  <div class="flashcard" id="flashcard" onclick="flipCard()">
    <div class="card-face front">
      <div class="card-num" id="card-num"></div>
      <div class="card-badge" id="card-badge"></div>
      <div class="card-question" id="card-question"></div>
      <div class="card-hint">タップして答えを確認</div>
    </div>
    <div class="card-face back">
      <div class="card-badge" id="card-badge-back"></div>
      <div class="card-answer" id="card-answer"></div>
      <div class="card-explanation" id="card-explanation"></div>
    </div>
  </div>
</div>
<div class="result-btns" id="result-btns">
  <button class="btn btn-wrong" onclick="markResult(false)">✗ もう一度</button>
  <button class="btn btn-correct" onclick="markResult(true)">✓ 正解！</button>
</div>
<div class="controls">
  <button class="btn btn-secondary" onclick="prevCard()">← 前へ</button>
  <button class="btn btn-primary" onclick="nextCard()">次へ →</button>
  <button class="btn btn-danger" onclick="shuffleAndReset()">🔀 シャッフル</button>
</div>
<div class="complete-screen" id="complete-screen">
  <div class="complete-emoji" id="complete-emoji">🎉</div>
  <div class="complete-title">COMPLETE!</div>
  <div class="complete-score" id="complete-score"></div>
  <div class="complete-sub" id="complete-sub"></div>
  <br><br>
  <button class="btn btn-primary" onclick="restartAll()" style="margin:auto">もう一度挑戦</button>
</div>
<script>
const CATEGORIES={
  alkali:{label:'アルカリ金属',cls:'badge-alkali'},
  alkaline:{label:'アルカリ土類金属',cls:'badge-alkaline'},
  aluminum:{label:'Al・Sn・Pb',cls:'badge-aluminum'}
};

const ALL_QUESTIONS=[

// ============================================================
// アルカリ金属（image2・image5 より）
// ============================================================
{id:1,category:'alkali',
question:'アルカリ金属は何族の元素か。',
answer:'第1族元素（水素を除く）',
explanation:'Li・Na・K・Rb・Cs・Frが含まれる。'},

{id:2,category:'alkali',
question:'アルカリ金属に含まれる元素を原子番号順に答えよ。',
answer:'Li（リチウム）、Na（ナトリウム）、K（カリウム）、Rb（ルビジウム）、Cs（セシウム）、Fr（フランシウム）',
explanation:'価電子が1個。最外殻電子数はすべて1。'},

{id:3,category:'alkali',
question:'アルカリ金属の価電子数を答えよ。',
answer:'1個',
explanation:'最外殻に電子が1個あり、1価の陽イオンになりやすい。'},

{id:4,category:'alkali',
question:'アルカリ金属の融点・密度は一般的な金属と比べてどうか。',
answer:'融点が低く、密度が小さい（軽い）。\nLi・Na・Kは密度が水より小さく、水に浮く。',
explanation:'原子番号が大きくなるほど融点は低くなる傾向がある。'},

{id:5,category:'alkali',
question:'アルカリ金属を石油中に保存する理由を答えよ。',
answer:'空気中の水分・酸素と激しく反応するため、石油中に保存して空気と遮断する。',
explanation:'Na・Kなどは空気中に放置すると酸化・発火の危険がある。'},

{id:6,category:'alkali',
question:'アルカリ金属の反応性は原子番号が大きくなるとどう変化するか。',
answer:'原子番号が大きいほど反応性が強くなる。\nLi < Na < K < Rb < Cs の順に強い。',
explanation:'原子番号が大きいほどイオン化エネルギーが小さく、陽イオンになりやすい。'},

{id:7,category:'alkali',
question:'アルカリ金属と水の反応の特徴を答えよ。',
answer:'水と反応してH₂を発生し、強塩基性の水酸化物水溶液を生じる。\n2M + 2H₂O → 2MOH + H₂↑',
explanation:'K以降は発火しながら激しく反応する。'},

{id:8,category:'alkali',
question:'Naと水の反応式を書け。',
answer:'2Na + 2H₂O → 2NaOH + H₂↑',
explanation:'NaOHは強塩基。Naは水面を激しく動き回りながら溶ける。'},

{id:9,category:'alkali',
question:'Naを空気中で穏やかに加熱したときの反応式と生成物を答えよ。',
answer:'4Na + O₂ → 2Na₂O（酸化ナトリウム）',
explanation:'穏やかな条件ではNa₂Oが生成する。'},

{id:10,category:'alkali',
question:'Naを過剰な酸素中で燃焼させたときの反応式と生成物を答えよ。',
answer:'2Na + O₂ → Na₂O₂（過酸化ナトリウム）',
explanation:'Na₂O₂（過酸化ナトリウム）は強い酸化剤。水と反応してH₂O₂を生じる。'},

{id:11,category:'alkali',
question:'NaOHの色・状態と特有の性質を答えよ。',
answer:'白色固体。水に非常によく溶けて強塩基性を示す。潮解性をもつ。',
explanation:'潮解性：空気中の水分を吸収して自ら溶けていく性質。密封保存が必要。'},

{id:12,category:'alkali',
question:'NaOHが空気中のCO₂（少量）を吸収する反応式を書け。',
answer:'2NaOH + CO₂ → Na₂CO₃ + H₂O',
explanation:'CO₂少量ではNa₂CO₃（炭酸ナトリウム）が生成する。'},

{id:13,category:'alkali',
question:'NaOHが空気中のCO₂（過剰）を吸収する反応式を書け。',
answer:'NaOH + CO₂ → NaHCO₃',
explanation:'CO₂過剰ではNaHCO₃（炭酸水素ナトリウム）が生成する。'},

{id:14,category:'alkali',
question:'Na₂CO₃と希塩酸HClの反応式を書け。',
answer:'Na₂CO₃ + 2HCl → 2NaCl + H₂O + CO₂↑',
explanation:'弱酸の塩に強酸を加えると弱酸が遊離する。CO₂が発生する。'},

{id:15,category:'alkali',
question:'NaHCO₃と希塩酸HClの反応式を書け。',
answer:'NaHCO₃ + HCl → NaCl + H₂O + CO₂↑',
explanation:'重曹（ベーキングパウダー）の主成分。胃薬にも利用。'},

{id:16,category:'alkali',
question:'NaHCO₃を加熱したときの熱分解反応式を書け。',
answer:'2NaHCO₃ → Na₂CO₃ + H₂O + CO₂↑',
explanation:'加熱するとNa₂CO₃が残る。ケーキが膨らむ原理。'},

{id:17,category:'alkali',
question:'Na₂CO₃·10H₂Oの俗称を答えよ。',
answer:'洗濯ソーダ',
explanation:'炭酸ナトリウム十水和物。'},

{id:18,category:'alkali',
question:'「風解」とはどういう現象か。Na₂CO₃·10H₂Oを例に答えよ。',
answer:'結晶が乾燥空気中で結晶水を失い粉末状になる現象。\nNa₂CO₃·10H₂O → Na₂CO₃·H₂O + 9H₂O',
explanation:'Na₂CO₃·10H₂Oは乾燥空気に放置すると白色粉末のNa₂CO₃·H₂Oになる。'},

{id:19,category:'alkali',
question:'ソルベー法の主反応式を書け。',
answer:'NaCl + NH₃ + H₂O + CO₂ → NaHCO₃↓ + NH₄Cl',
explanation:'飽和食塩水にNH₃とCO₂を吹き込むとNaHCO₃が先に沈殿する。'},

{id:20,category:'alkali',
question:'ソルベー法でNaHCO₃をNa₂CO₃に変える工程の反応式を書け。',
answer:'2NaHCO₃ → Na₂CO₃ + H₂O + CO₂↑（加熱）',
explanation:'生成したNa₂CO₃はガラス・洗剤・製紙の原料として重要。'},

{id:21,category:'alkali',
question:'ソルベー法でNH₃を回収する工程の反応式を書け。',
answer:'2NH₄Cl + Ca(OH)₂ → CaCl₂ + 2NH₃↑ + 2H₂O',
explanation:'副生成物のNH₄Clに消石灰を加えてNH₃を回収・循環利用する。'},

{id:22,category:'alkali',
question:'塩化ナトリウム水溶液を電気分解したときの陰極・陽極での変化を答えよ。',
answer:'陽極：2Cl⁻ → Cl₂↑ + 2e⁻\n陰極：2H₂O + 2e⁻ → H₂↑ + 2OH⁻',
explanation:'イオン交換膜法では陽極側にCl₂、陰極側にH₂とNaOHが得られる。'},

{id:23,category:'alkali',
question:'炎色反応でLi・Na・Kはそれぞれ何色か。',
answer:'Li：赤色\nNa：黄色\nK：紫色',
explanation:'Naは微量でも鮮明な黄色を示す。花火の色に利用される。'},

// ============================================================
// アルカリ土類金属（image3・image4 より）
// ============================================================
{id:24,category:'alkaline',
question:'アルカリ土類金属は何族の元素か。',
answer:'第2族元素',
explanation:'Be・Mg・Ca・Sr・Ba・Raが含まれる。価電子は2個。'},

{id:25,category:'alkaline',
question:'アルカリ土類金属に含まれる元素を原子番号順に答えよ。',
answer:'Be（ベリリウム）・Mg（マグネシウム）・Ca（カルシウム）・Sr（ストロンチウム）・Ba（バリウム）・Ra（ラジウム）',
explanation:'価電子2個。2価の陽イオンになりやすい。'},

{id:26,category:'alkaline',
question:'アルカリ土類金属の融点はアルカリ金属と比べてどうか。',
answer:'アルカリ金属より融点が高い。',
explanation:'価電子が2個あり金属結合が強いため、アルカリ金属より融点・密度が大きい傾向がある。'},

{id:27,category:'alkaline',
question:'アルカリ土類金属のうち冷水と反応しないものはどれか。理由も答えよ。',
answer:'BeとMg。\n理由：表面に緻密な酸化被膜が形成されて内部が保護されるから。',
explanation:'MgはCaと異なり冷水に反応しない。熱水や酸には溶ける。'},

{id:28,category:'alkaline',
question:'Mgと酸素の反応式を書け。また燃焼の特徴を答えよ。',
answer:'2Mg + O₂ → 2MgO\n特徴：白色の強い光を放って燃焼する。',
explanation:'花火・フラッシュ照明・発炎筒に利用される。'},

{id:29,category:'alkaline',
question:'Mgと熱水の反応式を書け。',
answer:'Mg + 2H₂O → Mg(OH)₂ + H₂↑',
explanation:'冷水とはほぼ反応しないが、熱水とは反応する。'},

{id:30,category:'alkaline',
question:'Caと冷水の反応式を書け。',
answer:'Ca + 2H₂O → Ca(OH)₂ + H₂↑',
explanation:'Ca(OH)₂（消石灰）が生成。水溶液が石灰水で弱塩基性。'},

{id:31,category:'alkaline',
question:'CaO（生石灰）と水の反応式と熱的特徴を答えよ。',
answer:'CaO + H₂O → Ca(OH)₂\n特徴：激しく発熱する（発熱反応）',
explanation:'Ca(OH)₂（消石灰）が生成する。乾燥剤・土壌改良材に利用。'},

{id:32,category:'alkaline',
question:'Ca(OH)₂（消石灰）を加熱したときの反応式を書け。',
answer:'Ca(OH)₂ → CaO + H₂O',
explanation:'加熱による脱水分解でCaO（生石灰）に戻る。'},

{id:33,category:'alkaline',
question:'CaCO₃（石灰石）を強熱したときの反応式を書け。',
answer:'CaCO₃ → CaO + CO₂↑',
explanation:'セメント・石灰製造の基本反応。'},

{id:34,category:'alkaline',
question:'CaCO₃に希塩酸を加えたときの反応式を書け。',
answer:'CaCO₃ + 2HCl → CaCl₂ + H₂O + CO₂↑',

const WRONG_KEY='chem_flash1_wrong';
function loadWrongIds(){try{return new Set(JSON.parse(localStorage.getItem(WRONG_KEY)||'[]'));}catch(e){return new Set();}}
function saveWrongIds(s){try{localStorage.setItem(WRONG_KEY,JSON.stringify(Array.from(s)));}catch(e){}}
var wrongIds=loadWrongIds();
var currentFilter='all';

function updateWrongBadge(){
  var cnt=wrongIds.size;
  var el=document.getElementById('wrong-count-badge');
  if(el)el.textContent=cnt;
  var btn=document.getElementById('clear-wrong-btn');
  if(btn)btn.style.display=cnt>0?'':'none';
}
function clearWrongList(){
  if(!confirm('間違えリストをリセットしますか？'))return;
  wrongIds.clear();
  saveWrongIds(wrongIds);
  updateWrongBadge();
  if(currentFilter==='wrong'){filteredQ=[];renderCard();}
}

var filteredQ=ALL_QUESTIONS.slice();
var currentIndex=0,isFlipped=false,correctCount=0,wrongCount=0,answered=new Set();

function setFilter(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  currentFilter=cat;
  if(cat==='all'){filteredQ=ALL_QUESTIONS.slice();}
  else if(cat==='wrong'){filteredQ=ALL_QUESTIONS.filter(function(q){return wrongIds.has(q.id);});}
  else{filteredQ=ALL_QUESTIONS.filter(function(q){return q.category===cat;});}
  restartAll();
}
function shuffleArray(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
}
function shuffleAndReset(){
  shuffleArray(filteredQ);
  currentIndex=0;isFlipped=false;correctCount=0;wrongCount=0;answered.clear();
  document.getElementById('complete-screen').classList.remove('visible');
  document.getElementById('card-area').style.display='';
  document.getElementById('result-btns').classList.remove('visible');
  renderCard();
}
function restartAll(){
  currentIndex=0;isFlipped=false;correctCount=0;wrongCount=0;answered.clear();
  document.getElementById('complete-screen').classList.remove('visible');
  document.getElementById('card-area').style.display='';
  document.getElementById('result-btns').classList.remove('visible');
  renderCard();updateWrongBadge();
}
function renderCard(){
  if(currentIndex>=filteredQ.length){showComplete();return;}
  var q=filteredQ[currentIndex],cat=CATEGORIES[q.category];
  document.getElementById('card-num').textContent='Q '+(currentIndex+1)+' / '+filteredQ.length;
  ['card-badge','card-badge-back'].forEach(function(id){
    var el=document.getElementById(id);
    el.className='card-badge '+cat.cls;
    el.textContent=cat.label;
  });
  document.getElementById('card-question').textContent=q.question;
  document.getElementById('card-answer').textContent=q.answer;
  document.getElementById('card-explanation').textContent=q.explanation;
  document.getElementById('flashcard').classList.remove('flipped');
  isFlipped=false;
  document.getElementById('result-btns').classList.remove('visible');
  updateStats();updateWrongBadge();
}
function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped',isFlipped);
  if(isFlipped)document.getElementById('result-btns').classList.add('visible');
}
function markResult(correct){
  if(!answered.has(currentIndex)){
    answered.add(currentIndex);
    var qid=filteredQ[currentIndex].id;
    if(correct){correctCount++;wrongIds.delete(qid);}
    else{wrongCount++;wrongIds.add(qid);}
    saveWrongIds(wrongIds);updateWrongBadge();
  }
  nextCard();
}
function nextCard(){if(currentIndex<filteredQ.length-1){currentIndex++;renderCard();}else showComplete();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCard();}}
function updateStats(){
  document.getElementById('stat-total').textContent=filteredQ.length;
  document.getElementById('stat-correct').textContent=correctCount;
  document.getElementById('stat-wrong').textContent=wrongCount;
  document.getElementById('stat-remain').textContent=filteredQ.length-answered.size;
  var pct=filteredQ.length>0?Math.round((answered.size/filteredQ.length)*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=answered.size+' / '+filteredQ.length;
}
function showComplete(){
  document.getElementById('card-area').style.display='none';
  document.getElementById('result-btns').classList.remove('visible');
  var total=answered.size,pct=total>0?Math.round((correctCount/total)*100):0;
  var emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  document.getElementById('complete-emoji').textContent=emoji;
  document.getElementById('complete-score').textContent=correctCount+' / '+total;
  document.getElementById('complete-sub').textContent='正答率 '+pct+'% — '+(pct>=80?'すばらしい！':pct>=60?'もう少し！':'復習しよう！');
  document.getElementById('complete-screen').classList.add('visible');
  updateStats();
}
function toggleTheme(){
  document.body.classList.toggle('light');
  document.querySelector('.theme-toggle').textContent=document.body.classList.contains('light')?'🌙':'☀️';
}

renderCard();
updateWrongBadge();
</script>
